<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Face Service Camera</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d6dce8;
      --accent: #1769aa;
      --accent-dark: #0f4f82;
      --good: #157347;
      --bad: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      align-items: start;
    }

    .camera-panel,
    .control-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .video-wrap {
      position: relative;
      background: #111820;
      aspect-ratio: 4 / 3;
    }

    video,
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    canvas {
      display: none;
    }

    .status-pill {
      position: absolute;
      left: 12px;
      top: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .preview-strip {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      border-top: 1px solid var(--line);
      align-items: center;
    }

    .preview {
      width: 120px;
      aspect-ratio: 4 / 3;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #eef2f7;
      object-fit: cover;
    }

    .panel-body {
      padding: 16px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 22px;
      line-height: 1.2;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button.secondary {
      background: #fff;
      border-color: var(--line);
      color: var(--text);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    pre {
      min-height: 180px;
      max-height: 360px;
      overflow: auto;
      margin: 14px 0 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #101828;
      color: #d6e4ff;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.45;
    }

    .result {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .result.good {
      color: var(--good);
      font-weight: 700;
    }

    .result.bad {
      color: var(--bad);
      font-weight: 700;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
      }

      .preview-strip {
        grid-template-columns: 96px minmax(0, 1fr);
      }

      .preview {
        width: 96px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="camera-panel">
      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div id="cameraStatus" class="status-pill">Kamera mati</div>
      </div>
      <div class="preview-strip">
        <img id="preview" class="preview" alt="">
        <p id="summary" class="result">Belum ada capture.</p>
      </div>
    </section>

    <section class="control-panel">
      <div class="panel-body">
        <h1>Face Service Camera</h1>

        <label for="mode">Mode</label>
        <select id="mode">
          <option value="recognize">Recognize absensi</option>
          <option value="enroll">Enroll wajah</option>
        </select>

        <label for="userId">User ID</label>
        <input id="userId" type="text" value="1" autocomplete="off">

        <label for="threshold">Threshold</label>
        <input id="threshold" type="number" min="0.1" max="1" step="0.01" value="0.35">

        <div class="button-row">
          <button id="startCamera" class="secondary" type="button">Kamera</button>
          <button id="captureOnce" class="secondary" type="button" disabled>Capture</button>
          <button id="autoScan" class="primary" type="button" disabled>Auto Scan</button>
          <button id="stopScan" class="secondary" type="button" disabled>Stop</button>
        </div>

        <pre id="output">{}</pre>
      </div>
    </section>
  </main>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const preview = document.getElementById("preview");
    const mode = document.getElementById("mode");
    const userId = document.getElementById("userId");
    const threshold = document.getElementById("threshold");
    const output = document.getElementById("output");
    const summary = document.getElementById("summary");
    const cameraStatus = document.getElementById("cameraStatus");
    const startCameraButton = document.getElementById("startCamera");
    const captureOnceButton = document.getElementById("captureOnce");
    const autoScanButton = document.getElementById("autoScan");
    const stopScanButton = document.getElementById("stopScan");

    let stream = null;
    let scanTimer = null;
    let isSending = false;

    startCameraButton.addEventListener("click", startCamera);
    captureOnceButton.addEventListener("click", () => sendFrame());
    autoScanButton.addEventListener("click", startAutoScan);
    stopScanButton.addEventListener("click", stopAutoScan);

    async function startCamera() {
      if (stream) {
        return;
      }

      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 960 },
          height: { ideal: 720 },
          facingMode: "user"
        },
        audio: false
      });

      video.srcObject = stream;
      cameraStatus.textContent = "Kamera aktif";
      captureOnceButton.disabled = false;
      autoScanButton.disabled = false;
    }

    function startAutoScan() {
      if (!stream || scanTimer) {
        return;
      }

      sendFrame();
      scanTimer = window.setInterval(sendFrame, 2200);
      autoScanButton.disabled = true;
      stopScanButton.disabled = false;
      cameraStatus.textContent = "Auto scan aktif";
    }

    function stopAutoScan() {
      if (scanTimer) {
        window.clearInterval(scanTimer);
        scanTimer = null;
      }

      autoScanButton.disabled = !stream;
      stopScanButton.disabled = true;
      cameraStatus.textContent = stream ? "Kamera aktif" : "Kamera mati";
    }

    async function sendFrame() {
      if (!stream || isSending) {
        return;
      }

      isSending = true;
      try {
        const blob = await captureBlob();
        preview.src = URL.createObjectURL(blob);

        const formData = new FormData();
        formData.append("image", blob, "camera.jpg");

        let url = "/recognize";
        if (mode.value === "enroll") {
          url = "/enroll";
          formData.append("user_id", userId.value.trim());
        } else {
          formData.append("threshold", threshold.value);
        }

        const response = await fetch(url, {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
        renderSummary(data);

        if (data.success === true) {
          stopAutoScan();
        }
      } catch (error) {
        summary.className = "result bad";
        summary.textContent = error.message;
      } finally {
        isSending = false;
      }
    }

    function captureBlob() {
      const width = video.videoWidth || 640;
      const height = video.videoHeight || 480;

      canvas.width = width;
      canvas.height = height;
      canvas.getContext("2d").drawImage(video, 0, 0, width, height);

      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) {
            resolve(blob);
          } else {
            reject(new Error("Gagal mengambil frame kamera."));
          }
        }, "image/jpeg", 0.92);
      });
    }

    function renderSummary(data) {
      if (data.success === true && data.enrollment) {
        summary.className = "result good";
        summary.textContent = `Enroll berhasil untuk user ${data.enrollment.user_id}.`;
        return;
      }

      if (data.success === true && data.recognition) {
        summary.className = "result good";
        summary.textContent = `Cocok dengan user ${data.recognition.user_id}, distance ${formatDistance(data.recognition.distance)}.`;
        return;
      }

      if (data.recognition) {
        summary.className = "result bad";
        summary.textContent = `${data.recognition.message} Distance ${formatDistance(data.recognition.distance)}.`;
        return;
      }

      summary.className = "result bad";
      summary.textContent = data.message || data.reason || "Capture belum berhasil.";
    }

    function formatDistance(value) {
      if (typeof value !== "number") {
        return "-";
      }

      return Math.max(0, value).toFixed(4);
    }
  </script>
</body>
</html>
